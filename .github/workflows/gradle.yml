name: CI/CD Pipeline
on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

jobs:
  format-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: Run format check
        run: pnpm format:check

  changelog-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: Validate changelogs
        run: pnpm changelogs:validate

  translation-check:
    runs-on: ubuntu-latest
    # Skipped on draft PRs: translations are only expected once the PR is
    # marked ready for review.
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: Check for missing English translations
        run: pnpm missing-tr en
      - name: Check for missing French translations
        if: ${{ !cancelled() }}
        run: pnpm missing-tr fr

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: Generate models
        run: pnpm generate
      - name: Generate Next.js types
        run: pnpm exec next typegen
      - name: Type check
        run: pnpm type-check

  tag:
    needs: [format-check, changelog-check, translation-check, type-check]
    if: |
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/'))
    name: Create Tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get version from package.json
        id: version
        run: echo "value=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Check if tag already exists
        id: tag_check
        run: |
          git fetch --tags

          if git tag -l "v${{ steps.version.outputs.value }}" | grep -q .; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create tag
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag v${{ steps.version.outputs.value }}
          git push origin v${{ steps.version.outputs.value }}
